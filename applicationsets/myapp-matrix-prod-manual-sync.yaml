apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: myapp-matrix-manual-sync
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error

  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/gMpHSpLB/myapp-gitops_1.git
              revision: main
              files:
                - path: "envs/*/env-config.yaml"
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster

  template:
    metadata:
      name: "myapp-{{.environment}}-{{.name}}"
      labels:
        environment: "{{.environment}}"
        cluster: "{{.name}}"
        requireManualPromotion: "{{ default false .requireManualPromotion }}"
      annotations:
        notifications.argoproj.io/subscribe.on-sync-failed.slack: "{{.notifySlack}}"
        notifications.argoproj.io/subscribe.on-sync-failed.pagerduty: "{{.notifyPagerduty}}"
    spec:
      project: myapp-team
      sources:
        - repoURL: ghcr.io/gmphsplb/helm-lab
          chart: myapp
          targetRevision: "{{.chartVersion}}"
          helm:
            valueFiles:
              - "$values/envs/{{.environment}}/values.yaml"
        - repoURL: https://github.com/gMpHSpLB/myapp-gitops_1.git
          targetRevision: "{{.revision}}"
          ref: values
      destination:
        server: "{{.server}}"
        namespace: "{{.namespace}}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - Validate=true
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true
      ignoreDifferences:
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas

  templatePatch: |
    {{- if ne .environment "prod" }}
    spec:
      syncPolicy:
        automated: {}
    {{- end }}