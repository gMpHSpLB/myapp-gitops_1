# Dev environment values
# Updated automatically by CI pipeline

environment: dev
image:
  repository: ghcr.io//myapp
  tag: "sha-719edc4b8bf0ca8570af25063ca5be1b9b05f236" # CI updates this field
  digest: "" # CI updates this field (preferred over tag)
  pullPolicy: IfNotPresent
replicaCount: 1
config:
  APP_ENV: "dev"
  APP_LOG_LEVEL: "debug"
  APP_PORT: "8000"
resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"
service:
  type: NodePort
  nodePort: 30080
probes:
  readiness:
    path: /ready
    port: 8000
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 3
  liveness:
    path: /health
    port: 8000
    initialDelaySeconds: 15
    periodSeconds: 10
    failureThreshold: 3
podDisruptionBudget:
  enabled: false
autoscaling:
  enabled: false
networkPolicy:
  enabled: false # Enable in staging
