# Production environment values
# Updated via PR, requires 2 approvals, deploys in change window only

environment: prod
image:
  repository: ghcr.io/gmphsplb/myapp
  tag: "sha-719edc4b8bf0ca8570af25063ca5be1b9b05f236"
  digest: ""
  pullPolicy: IfNotPresent
replicaCount: 3
config:
  APP_ENV: "prod"
  APP_LOG_LEVEL: "warn"
  APP_PORT: "8000"
resources:
  requests:
    memory: "256Mi"
    cpu: "200m"
  limits:
    memory: "512Mi"
    cpu: "1000m"
service:
  type: ClusterIP
ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: myapp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: myapp-tls
      hosts:
        - myapp.example.com
probes:
  readiness:
    path: /ready
    port: 8000
    initialDelaySeconds: 15
    periodSeconds: 5
    failureThreshold: 3
  liveness:
    path: /health
    port: 8000
    initialDelaySeconds: 20
    periodSeconds: 10
    failureThreshold: 3
podDisruptionBudget:
  enabled: true
  minAvailable: 2
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
networkPolicy:
  enabled: true
externalSecretName: myapp-prod-secret
terminationGracePeriodSeconds: 60
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: myapp
        topologyKey: kubernetes.io/hostname
